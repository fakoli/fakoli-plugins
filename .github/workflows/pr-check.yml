name: PR Plugin Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'external_plugins/**'
      - '.claude-plugin/marketplace.json'
      - 'registry/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  check-plugin:
    name: Check Plugin Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run combined plugin checks
        run: ./scripts/check-all.sh

      - name: Check registry drift
        run: ./scripts/check-registry-drift.sh

      - name: Test handoff path resolver
        run: ./plugins/handoff/tests/test-handoff-path.sh

      - name: Test handoff freshness
        run: ./plugins/handoff/tests/test-handoff-freshness.sh

      - name: Test ship-task worktree merge handling
        run: bash ./plugins/ship-task/tests/test-ship-worktree.sh

      # Linux gate for the pulse dashboard server (node is preinstalled on
      # ubuntu-latest; the suite is hermetic — fake anvil shim, no docker).
      - name: Test gate-router
        run: bash ./plugins/gate-router/tests/test-gate-router.sh

      - name: Test windows-cli-hygiene
        run: bash ./plugins/windows-cli-hygiene/tests/test-scan-cli-hygiene.sh

      - name: Test anvil-pulse server
        run: bash ./plugins/anvil-pulse/tests/test-server.sh

      - name: Preview index changes
        run: |
          echo "Generating preview of registry index..."
          ./scripts/generate-index.sh
          echo ""
          echo "Registry would contain:"
          jq -r '.plugins[] | "  - \(.name) v\(.version)"' registry/index.json
          echo ""
          echo "Total plugins: $(jq '.pluginCount' registry/index.json)"
