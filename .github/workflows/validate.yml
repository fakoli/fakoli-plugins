name: Validate Plugins

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
      - 'registry/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
      - 'registry/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate Plugin Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run combined plugin checks
        run: ./scripts/check-all.sh

      - name: Check registry drift
        run: ./scripts/check-registry-drift.sh

      - name: Test handoff path resolver
        run: ./plugins/handoff/tests/test-handoff-path.sh
