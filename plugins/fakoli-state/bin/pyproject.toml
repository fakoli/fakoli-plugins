[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fakoli-state"
version = "1.15.0"
description = "Local-first project state engine: turn rough ideas and PRDs into reviewed, lockable, evidence-backed work packets that humans and AI agents can coordinate on without conflicts."
readme = "../README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Sekou Doumbouya" },
]
keywords = [
    "agent-coordination",
    "claims",
    "evidence-based",
    "locks",
    "mcp",
    "planning",
    "project-state",
    "sqlite",
    "tasks",
    "work-packets",
]
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "fastmcp",
    "anthropic>=0.30",
    "PyYAML>=6.0",
    "httpx>=0.27",
]

[project.scripts]
fakoli-state = "fakoli_state.cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.5",
    "mypy>=1.10",
    "types-pyyaml>=6.0.12.20260518",
    # HTTP mocker: respx mocks httpx (the transport our GitHub HTTP client uses).
    "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fakoli_state"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
# Tests routinely embed long SQL strings, assertion messages, and snapshot
# literals where readability beats wrapping.
"../tests/**" = ["E501"]

[tool.mypy]
strict = true
python_version = "3.11"

[[tool.mypy.overrides]]
# Tests intentionally use **dict factory patterns, assert against frozen
# dataclasses, and pass deliberately-wrong types to verify error paths.
# pytest's own conventions (fixtures, monkeypatch, parameterize) further
# undermine static typing. Keep strict on src; relax on tests.
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_calls = false
disallow_any_generics = false
warn_return_any = false
no_implicit_reexport = false
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["../tests"]
addopts = "-m 'not live_github'"
markers = [
    "live_github: tests that hit the real GitHub API (require FAKOLI_STATE_TEST_GH_TOKEN env)",
]
