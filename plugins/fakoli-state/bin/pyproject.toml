[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fakoli-state"
version = "0.0.1"
description = "Local-first project state engine: turn brainstorms and PRDs into reviewed, lockable, evidence-backed work packets that humans and AI agents can coordinate on without conflicts."
readme = "../README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Sekou Doumbouya" },
]
keywords = [
    "agent-coordination",
    "claims",
    "evidence-based",
    "locks",
    "mcp",
    "planning",
    "project-state",
    "sqlite",
    "tasks",
    "work-packets",
]
dependencies = [
    "typer>=0.12",
    "pydantic>=2.6",
    "fastmcp",
    "anthropic>=0.30",
    "PyYAML>=6.0",
]

[project.scripts]
fakoli-state = "fakoli_state.cli:app"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.5",
    "mypy>=1.10",
    "responses>=0.25",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fakoli_state"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
testpaths = ["../tests"]
